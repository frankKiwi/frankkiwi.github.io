<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Screen Mirror Cast Receiver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 1000;
        }
        #status.connected { background: rgba(0, 150, 0, 0.8); }
        #status.error { background: rgba(200, 0, 0, 0.8); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="status">Waiting for connection...</div>

    <!-- Google Cast Receiver SDK -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        var pc = null;
        var ws = null;
        var signalingServerIP = null;
        var signalingServerPort = 1118;
        var heartbeatTimer = null;
        var audioContext = null;
        var audioGainNode = null;
        var nextAudioTime = 0;
        var audioPacketCount = 0;

        // Cast Receiver 初始化
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // 监听自定义消息（从手机 App 发送的信令服务器 IP）
        const CUSTOM_CHANNEL = 'urn:x-cast:com.screenmirror.webrtc';

        context.addCustomMessageListener(CUSTOM_CHANNEL, (event) => {
            console.log('Custom message received:', event.data);
            let data = event.data;
            if (typeof data === 'string') {
                try {
                    data = JSON.parse(data);
                } catch (e) {
                    console.error('Failed to parse custom message JSON:', e);
                    return;
                }
            }

            if (data.type === 'start' && data.signalingIP) {
                signalingServerIP = data.signalingIP;
                signalingServerPort = Number(data.signalingPort || 1118);
                status.textContent = 'Connecting WebRTC...';
                connectWebRTC(signalingServerIP, signalingServerPort);
            } else if (data.type === 'stop') {
                closeWebRTC();
            }
        });

        // 启动 Cast Receiver
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        context.start(options);

        console.log('Cast Receiver started');

        // WebRTC 连接
        function connectWebRTC(ip, port) {
            console.log('Connecting signaling server:', ip, port);

            // 创建 WebSocket 连接到手机的信令服务器
            const wsUrl = `ws://${ip}:${port}`;
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                console.log('WebSocket connected');
                status.textContent = 'Signaling connected, waiting for stream...';
                createPeerConnection();
                ws.send(JSON.stringify({ type: 'ready' }));
                startHeartbeat();
            };

            ws.onmessage = async (event) => {
                if (typeof event.data !== 'string') {
                    await handleBinaryAudio(event.data);
                    return;
                }
                const message = JSON.parse(event.data);
                console.log('Signaling message:', message.type);

                if (message.type === 'offer') {
                    await handleOffer(message);
                } else if (message.type === 'ice-candidate') {
                    await handleIceCandidate(message);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                status.textContent = 'Connection error';
                status.className = 'error';
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                stopHeartbeat();
                setTimeout(() => {
                    if (signalingServerIP) {
                        connectWebRTC(signalingServerIP, signalingServerPort);
                    }
                }, 3000);
            };
        }

        async function handleBinaryAudio(data) {
            try {
                const arrayBuffer = data instanceof ArrayBuffer ? data : await data.arrayBuffer();
                if (arrayBuffer.byteLength < 14) return;
                const view = new DataView(arrayBuffer);
                const magic =
                    String.fromCharCode(view.getUint8(0)) +
                    String.fromCharCode(view.getUint8(1)) +
                    String.fromCharCode(view.getUint8(2)) +
                    String.fromCharCode(view.getUint8(3));
                if (magic !== 'AUD0') return;

                const sampleRate = view.getUint32(4, true);
                const channels = view.getUint16(8, true);
                const frameCount = view.getUint32(10, true);
                const payloadOffset = 14;
                const expectedBytes = frameCount * channels * 2;
                if (arrayBuffer.byteLength < payloadOffset + expectedBytes) return;

                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioGainNode = audioContext.createGain();
                    audioGainNode.gain.value = 1.0;
                    audioGainNode.connect(audioContext.destination);
                    nextAudioTime = audioContext.currentTime;
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const audioBuffer = audioContext.createBuffer(channels, frameCount, sampleRate);
                // 显式按 little-endian 解析，避免不同运行时对 Int16Array 端序处理差异引入噪声。
                const pcmDataView = new DataView(arrayBuffer, payloadOffset, frameCount * channels * 2);
                for (let ch = 0; ch < channels; ch++) {
                    const channelData = audioBuffer.getChannelData(ch);
                    for (let i = 0; i < frameCount; i++) {
                        const sampleIndex = i * channels + ch;
                        const s16 = pcmDataView.getInt16(sampleIndex * 2, true);
                        channelData[i] = s16 / 32768;
                    }
                }

                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioGainNode);
                // 固定 10ms 时钟推进，减少包长抖动导致的刺啦声。
                const now = audioContext.currentTime;
                if (nextAudioTime < now + 0.15) nextAudioTime = now + 0.15;
                if (nextAudioTime - now > 1.5) nextAudioTime = now + 0.2;
                const startAt = nextAudioTime;
                source.start(startAt);
                const packetDuration = (sampleRate === 48000 && frameCount === 960) ? 0.02 : (frameCount / sampleRate);
                nextAudioTime = startAt + packetDuration;
                audioPacketCount += 1;
                if (audioPacketCount % 100 === 0) {
                    console.log('Audio packets played:', audioPacketCount, 'rate:', sampleRate, 'ch:', channels);
                }
            } catch (error) {
                console.error('Audio chunk handling failed:', error);
            }
        }

        function startHeartbeat() {
            stopHeartbeat();
            heartbeatTimer = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
                }
            }, 10000);
        }

        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
        }

        function createPeerConnection() {
            const config = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            };

            pc = new RTCPeerConnection(config);

            pc.ontrack = (event) => {
                console.log('Media track received:', event.track.kind);
                if (event.streams && event.streams[0] && video.srcObject !== event.streams[0]) {
                    video.srcObject = event.streams[0];
                }

                if (event.track.kind === 'video') {
                    // 先保证视频自动播放稳定，音频走独立 AudioContext 通道
                    video.muted = true;
                    video.play().catch(e => console.error('Playback failed:', e));
                    status.textContent = 'Playing';
                    status.className = 'connected';

                    // 3秒后隐藏状态
                    setTimeout(() => {
                        status.classList.add('hidden');
                    }, 3000);
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        }
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                console.log('Connection state:', pc.connectionState);
                if (pc.connectionState === 'connected') {
                    status.textContent = 'Connected';
                    status.className = 'connected';
                } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    status.textContent = 'Disconnected';
                    status.className = 'error';
                    status.classList.remove('hidden');
                }
            };

            console.log('PeerConnection created');
        }

        async function handleOffer(message) {
            if (!pc) createPeerConnection();

            try {
                const offer = new RTCSessionDescription({
                    type: 'offer',
                    sdp: message.sdp
                });

                await pc.setRemoteDescription(offer);
                console.log('Remote offer set');

                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                console.log('Answer created');

                ws.send(JSON.stringify({
                    type: 'answer',
                    sdp: answer.sdp
                }));
            } catch (error) {
                console.error('Failed to handle offer:', error);
                status.textContent = 'Connection failed: ' + error.message;
                status.className = 'error';
            }
        }

        async function handleIceCandidate(message) {
            if (!pc) return;

            try {
                const candidate = new RTCIceCandidate(message.candidate);
                await pc.addIceCandidate(candidate);
                console.log('ICE candidate added');
            } catch (error) {
                console.error('Failed to add ICE candidate:', error);
            }
        }

        function closeWebRTC() {
            if (ws) {
                stopHeartbeat();
                ws.close();
                ws = null;
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            video.srcObject = null;
            if (audioContext) {
                audioContext.close().catch(() => {});
                audioContext = null;
            }
            nextAudioTime = 0;
            status.textContent = 'Disconnected';
            status.className = '';
            status.classList.remove('hidden');
        }
    </script>
</body>
</html>
