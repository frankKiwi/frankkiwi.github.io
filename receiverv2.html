<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Screen Mirror Cast Receiver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 1000;
        }
        #status.connected { background: rgba(0, 150, 0, 0.8); }
        #status.error { background: rgba(200, 0, 0, 0.8); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="status">Waiting for connection...</div>

    <!-- Google Cast Receiver SDK -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        var pc = null;
        var ws = null;
        var signalingServerIP = null;
        var signalingServerPort = 1118;
        var heartbeatTimer = null;
        var audioContext = null;
        var audioNode = null;
        var audioGainNode = null;
        var audioWorkletReady = false;
        var audioPlaybackReady = false;
        var audioUseScriptProcessor = false;
        var scriptNode = null;
        var pendingAudioChunks = [];
        var audioPacketCount = 0;
        var ringCap = 48000 * 6;
        var ringBuf = new Float32Array(ringCap);
        var ringRead = 0, ringWrite = 0, ringCount = 0;
        var ringStarted = false;
        var ringStartThreshold = 480;

        async function forceUnlockWebAudio() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        latencyHint: 'interactive',
                        sampleRate: 48000
                    });
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
            } catch (e) {
                console.warn('forceUnlockWebAudio:', e);
            }
        }

        function resetAudioRing() {
            ringRead = ringWrite = ringCount = 0;
            ringStarted = false;
            ringBuf.fill(0);
        }

        function pushAudioToRing(float32) {
            const incoming = float32.length;
            if (incoming <= 0) return;
            let free = ringCap - ringCount;
            if (incoming > free) {
                const drop = incoming - free;
                ringRead = (ringRead + drop) % ringCap;
                ringCount -= drop;
            }
            for (let i = 0; i < incoming; i++) {
                ringBuf[ringWrite] = float32[i];
                ringWrite = (ringWrite + 1) % ringCap;
            }
            ringCount += incoming;
            if (!ringStarted && ringCount >= ringStartThreshold) ringStarted = true;
        }

        // Cast Receiver 初始化
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // 监听自定义消息（从手机 App 发送的信令服务器 IP）
        const CUSTOM_CHANNEL = 'urn:x-cast:com.screenmirror.webrtc';

        context.addCustomMessageListener(CUSTOM_CHANNEL, (event) => {
            console.log('Custom message received:', event.data);
            let data = event.data;
            if (typeof data === 'string') {
                try {
                    data = JSON.parse(data);
                } catch (e) {
                    console.error('Failed to parse custom message JSON:', e);
                    return;
                }
            }

            if (data.type === 'start' && data.signalingIP) {
                signalingServerIP = data.signalingIP;
                signalingServerPort = Number(data.signalingPort || 1118);
                status.textContent = 'Connecting WebRTC...';
                forceUnlockWebAudio();
                connectWebRTC(signalingServerIP, signalingServerPort);
            } else if (data.type === 'stop') {
                closeWebRTC();
            }
        });

        // 启动 Cast Receiver
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        context.start(options);

        try {
            const sysEt = cast.framework && cast.framework.system && cast.framework.system.EventType;
            if (sysEt && sysEt.READY) {
                context.addEventListener(sysEt.READY, () => {
                    console.log('Cast system READY — unlock WebAudio');
                    forceUnlockWebAudio();
                });
            }
        } catch (e) {
            console.warn('Cast READY listener:', e);
        }

        console.log('Cast Receiver started');

        // WebRTC 连接
        function connectWebRTC(ip, port) {
            console.log('Connecting signaling server:', ip, port);

            // 创建 WebSocket 连接到手机的信令服务器
            const wsUrl = `ws://${ip}:${port}`;
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                console.log('WebSocket connected');
                status.textContent = 'Signaling connected, waiting for stream...';
                forceUnlockWebAudio();
                createPeerConnection();
                ws.send(JSON.stringify({ type: 'ready' }));
                startHeartbeat();
            };

            ws.onmessage = async (event) => {
                if (typeof event.data !== 'string') {
                    await handleBinaryAudio(event.data);
                    return;
                }
                const message = JSON.parse(event.data);
                console.log('Signaling message:', message.type);

                if (message.type === 'offer') {
                    await handleOffer(message);
                } else if (message.type === 'ice-candidate') {
                    await handleIceCandidate(message);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                status.textContent = 'Connection error';
                status.className = 'error';
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                stopHeartbeat();
                setTimeout(() => {
                    if (signalingServerIP) {
                        connectWebRTC(signalingServerIP, signalingServerPort);
                    }
                }, 3000);
            };
        }

        async function ensureAudioPipeline() {
            await forceUnlockWebAudio();
            if (audioPlaybackReady && audioContext) {
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                return;
            }
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    latencyHint: 'interactive',
                    sampleRate: 48000
                });
            }
            await forceUnlockWebAudio();

            if (!audioUseScriptProcessor) {
                try {
                    const workletCode = `
                class MirrorAudioProcessor extends AudioWorkletProcessor {
                    constructor() {
                        super();
                        this.capacity = 48000 * 6;
                        this.buffer = new Float32Array(this.capacity);
                        this.readIndex = 0;
                        this.writeIndex = 0;
                        this.count = 0;
                        this.started = false;
                        this.startThreshold = 480;
                        this.underruns = 0;
                        this.port.onmessage = (event) => {
                            const msg = event.data || {};
                            if (msg.type === 'config' && Number.isFinite(msg.startThreshold)) {
                                this.startThreshold = Math.max(256, msg.startThreshold | 0);
                                return;
                            }
                            if (msg.type !== 'push' || !(msg.samples instanceof ArrayBuffer)) return;
                            const samples = new Float32Array(msg.samples);
                            const incoming = samples.length;
                            if (incoming <= 0) return;
                            let free = this.capacity - this.count;
                            if (incoming > free) {
                                const drop = incoming - free;
                                this.readIndex = (this.readIndex + drop) % this.capacity;
                                this.count -= drop;
                            }
                            for (let i = 0; i < incoming; i++) {
                                this.buffer[this.writeIndex] = samples[i];
                                this.writeIndex = (this.writeIndex + 1) % this.capacity;
                            }
                            this.count += incoming;
                            if (!this.started && this.count >= this.startThreshold) {
                                this.started = true;
                            }
                        };
                    }

                    process(inputs, outputs) {
                        const output = outputs[0][0];
                        const frames = output.length;
                        if (!this.started) {
                            output.fill(0);
                            return true;
                        }
                        for (let i = 0; i < frames; i++) {
                            if (this.count > 0) {
                                output[i] = this.buffer[this.readIndex];
                                this.readIndex = (this.readIndex + 1) % this.capacity;
                                this.count--;
                            } else {
                                output[i] = 0;
                                this.underruns++;
                            }
                        }
                        if (this.underruns > 0 && this.underruns % 2000 === 0) {
                            this.port.postMessage({ type: 'underrun', count: this.underruns });
                        }
                        return true;
                    }
                }
                registerProcessor('mirror-audio-processor', MirrorAudioProcessor);
            `;

                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    const moduleURL = URL.createObjectURL(blob);
                    await audioContext.audioWorklet.addModule(moduleURL);
                    URL.revokeObjectURL(moduleURL);

                    audioNode = new AudioWorkletNode(audioContext, 'mirror-audio-processor', {
                        numberOfInputs: 0,
                        numberOfOutputs: 1,
                        outputChannelCount: [1]
                    });
                    audioNode.port.onmessage = (event) => {
                        if (event.data && event.data.type === 'underrun') {
                            console.warn('Audio underrun count:', event.data.count);
                        }
                    };
                    audioNode.port.postMessage({ type: 'config', startThreshold: 480 });

                    audioGainNode = audioContext.createGain();
                    audioGainNode.gain.value = 1.0;
                    audioNode.connect(audioGainNode);
                    audioGainNode.connect(audioContext.destination);

                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }
                    audioWorkletReady = true;
                    audioPlaybackReady = true;

                    if (pendingAudioChunks.length > 0) {
                        pendingAudioChunks.forEach((chunk) => {
                            audioNode.port.postMessage({ type: 'push', samples: chunk }, [chunk]);
                        });
                        pendingAudioChunks = [];
                    }
                    return;
                } catch (err) {
                    console.warn('AudioWorklet unavailable, ScriptProcessor fallback', err);
                    audioUseScriptProcessor = true;
                    audioWorkletReady = false;
                    if (audioNode) {
                        try { audioNode.disconnect(); } catch (e) {}
                        audioNode = null;
                    }
                }
            }

            if (!audioGainNode) {
                audioGainNode = audioContext.createGain();
                audioGainNode.gain.value = 1.0;
                audioGainNode.connect(audioContext.destination);
            }
            if (!scriptNode) {
                scriptNode = audioContext.createScriptProcessor(2048, 0, 1);
                scriptNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    const n = out.length;
                    if (!ringStarted) {
                        out.fill(0);
                        return;
                    }
                    for (let i = 0; i < n; i++) {
                        if (ringCount > 0) {
                            out[i] = ringBuf[ringRead];
                            ringRead = (ringRead + 1) % ringCap;
                            ringCount--;
                        } else {
                            out[i] = 0;
                        }
                    }
                };
                scriptNode.connect(audioGainNode);
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            audioPlaybackReady = true;

            if (pendingAudioChunks.length > 0) {
                pendingAudioChunks.forEach((chunk) => {
                    pushAudioToRing(new Float32Array(chunk));
                });
                pendingAudioChunks = [];
            }
        }

        async function handleBinaryAudio(data) {
            try {
                const arrayBuffer = data instanceof ArrayBuffer ? data : await data.arrayBuffer();
                if (arrayBuffer.byteLength < 14) return;
                const view = new DataView(arrayBuffer);
                const magic =
                    String.fromCharCode(view.getUint8(0)) +
                    String.fromCharCode(view.getUint8(1)) +
                    String.fromCharCode(view.getUint8(2)) +
                    String.fromCharCode(view.getUint8(3));
                if (magic !== 'AUD0') return;

                const sampleRate = view.getUint32(4, true);
                const channels = view.getUint16(8, true);
                const frameCount = view.getUint32(10, true);
                const payloadOffset = 14;
                const expectedBytes = frameCount * channels * 2;
                if (arrayBuffer.byteLength < payloadOffset + expectedBytes) return;
                const pcmDataView = new DataView(arrayBuffer, payloadOffset, frameCount * channels * 2);
                const monoSamples = new Float32Array(frameCount);
                for (let i = 0; i < frameCount; i++) {
                    let mixed = 0;
                    for (let ch = 0; ch < channels; ch++) {
                        const sampleIndex = i * channels + ch;
                        mixed += pcmDataView.getInt16(sampleIndex * 2, true) / 32768;
                    }
                    monoSamples[i] = mixed / Math.max(1, channels);
                }

                await ensureAudioPipeline();
                if (audioUseScriptProcessor) {
                    pushAudioToRing(monoSamples);
                } else if (audioWorkletReady && audioNode) {
                    const chunk = monoSamples.buffer;
                    audioNode.port.postMessage({ type: 'push', samples: chunk }, [chunk]);
                } else {
                    pendingAudioChunks.push(monoSamples.slice().buffer);
                }
                audioPacketCount += 1;
                if (audioPacketCount <= 3 || audioPacketCount % 100 === 0) {
                    console.log('AUD0 rx', audioPacketCount, 'bytes', arrayBuffer.byteLength, 'ctx', audioContext && audioContext.state);
                }
            } catch (error) {
                console.error('Audio chunk handling failed:', error);
            }
        }

        function startHeartbeat() {
            stopHeartbeat();
            heartbeatTimer = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
                }
            }, 10000);
        }

        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
        }

        function createPeerConnection() {
            const config = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            };

            pc = new RTCPeerConnection(config);

            // 与扩展一致：AUD0 PCM 优先走 WebRTC DataChannel（SCTP），避免 WebSocket 二进制在部分 Cast/浏览器上丢失
            pc.ondatachannel = (ev) => {
                const ch = ev.channel;
                console.log('[mirror-audio] DataChannel label=', ch.label, 'id=', ch.id);
                ch.binaryType = 'arraybuffer';
                ch.onopen = () => console.log('[mirror-audio] open');
                ch.onerror = (e) => console.error('[mirror-audio] error', e);
                ch.onmessage = async (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        await handleBinaryAudio(e.data);
                    }
                };
            };

            pc.ontrack = (event) => {
                console.log('Media track received:', event.track.kind);
                if (event.streams && event.streams[0] && video.srcObject !== event.streams[0]) {
                    video.srcObject = event.streams[0];
                }

                if (event.track.kind === 'video') {
                    // 先保证视频自动播放稳定，音频走独立 AudioContext 通道
                    video.muted = true;
                    video.play().then(() => forceUnlockWebAudio()).catch(e => console.error('Playback failed:', e));
                    forceUnlockWebAudio();
                    status.textContent = 'Playing';
                    status.className = 'connected';

                    // 3秒后隐藏状态
                    setTimeout(() => {
                        status.classList.add('hidden');
                    }, 3000);
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        }
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                console.log('Connection state:', pc.connectionState);
                if (pc.connectionState === 'connected') {
                    status.textContent = 'Connected';
                    status.className = 'connected';
                } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    status.textContent = 'Disconnected';
                    status.className = 'error';
                    status.classList.remove('hidden');
                }
            };

            console.log('PeerConnection created');
        }

        async function handleOffer(message) {
            if (!pc) createPeerConnection();

            try {
                const offer = new RTCSessionDescription({
                    type: 'offer',
                    sdp: message.sdp
                });

                await pc.setRemoteDescription(offer);
                console.log('Remote offer set');

                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                console.log('Answer created');

                ws.send(JSON.stringify({
                    type: 'answer',
                    sdp: answer.sdp
                }));
            } catch (error) {
                console.error('Failed to handle offer:', error);
                status.textContent = 'Connection failed: ' + error.message;
                status.className = 'error';
            }
        }

        async function handleIceCandidate(message) {
            if (!pc) return;

            try {
                const candidate = new RTCIceCandidate(message.candidate);
                await pc.addIceCandidate(candidate);
                console.log('ICE candidate added');
            } catch (error) {
                console.error('Failed to add ICE candidate:', error);
            }
        }

        function closeWebRTC() {
            if (ws) {
                stopHeartbeat();
                ws.close();
                ws = null;
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            video.srcObject = null;
            if (scriptNode) {
                try { scriptNode.disconnect(); } catch (e) {}
                scriptNode.onaudioprocess = null;
                scriptNode = null;
            }
            if (audioNode) {
                try { audioNode.disconnect(); } catch (e) {}
                audioNode = null;
            }
            if (audioContext) {
                audioContext.close().catch(() => {});
                audioContext = null;
            }
            audioGainNode = null;
            audioWorkletReady = false;
            audioPlaybackReady = false;
            audioUseScriptProcessor = false;
            resetAudioRing();
            pendingAudioChunks = [];
            status.textContent = 'Disconnected';
            status.className = '';
            status.classList.remove('hidden');
        }
    </script>
</body>
</html>
